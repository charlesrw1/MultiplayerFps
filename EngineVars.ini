# Sectioned vars file. Engine selects exactly one section based on launch mode.
#   [app]          - normal app launch (default)
#   [game_test]    - --tests game
#   [editor_test]  - --tests editor
#
# Sections are independent: there is no fall-through or inheritance. If a var
# matters in multiple modes, list it in each section.
#
# [app] additionally loads a per-project .ini on top of this file (project vars
# always win): the file named by `startup_project` below, or whatever `--project
# <path>` passes on the command line. game_test/editor_test never load a project
# file — they stay fully self-contained in their sections.

[app]

# default project, overridden by --project <name|path> on the command line.
# a bare name like "DevEngine" resolves to Projects/DevEngine.ini
startup_project "bike_game"

r_indirect_loop 1
# render vars
gpu.draw_collision_tris 0
gpu.draw_sv_colliders 0
gpu.draw_viewmodel 1
view.tp 0
dbg.fly 0

r.editor_fast_frame_limit_fps 120
r.frame_limit_fps 67
r.enable_vsync 0

# TAA VARS
r.taa 1
r.taa_sharpness 0.08
r.taa_adaptive_blend 1
r.taa_motion_blend 0.6
r.taa_stationary_blend 0.9

# LIGHTING VARS
dt 1


# game vars
view.sens 0.005

g_draw_grid 0

enable_gl_debug_output 1

g_draw_physx_scene 0

disable_texture_loads 0
g_debug_skeletons 0

ed_decal_active 0
r.drawdecals 1

ddgi_probe_debug 0

ignore_folders 1

stat.fps 1
debug.menu_width 400

# Lua debugger (VS Code via actboy168.lua-debug). See docs/scripting/vscode_debugger.md.
# Enable per-run with Scripts/run_game.ps1 -LuaDebug / run_editor.ps1 -LuaDebug (--lua_debug CLI flag).
g_lua_cpath_extra "C:/Users/charl/source/vcpkg/installed/x64-windows/bin"
g_lua_debug_host "127.0.0.1"
g_lua_debug_port 9966


[game_test]
r.render_backend opengl

r_indirect_loop 1
gpu.draw_collision_tris 0
gpu.draw_sv_colliders 0
gpu.draw_viewmodel 1
view.tp 0
dbg.fly 0

view.sens 0.005

g_entry_level "mainMenuMap.tmap"
ed_default_sky_material "indoorHdriSky"
g_project_name DevEngine

g_project_base "TestFilesData"

g_draw_grid 0
enable_gl_debug_output 1
g_draw_physx_scene 0
disable_texture_loads 0
g_debug_skeletons 0
ed_decal_active 0
r.drawdecals 1
ddgi_probe_debug 0
ignore_folders 1
debug.menu_width 400

# game-test overrides
g_application_class "Application"
r.taa 0
ui.disable_screen_log 1
disable_render_time_tick 1
r.ddgi_halfres 0
r.ssr 0
r.ssao 1
dt 1
r.include_cubemaps 1
vid.width 600
vid.height 400
colorLog 0
r.enable_vsync 0

[editor_test]
r.render_backend opengl

r_indirect_loop 1
g_project_base "TestFilesData"
r.taa 0
ui.disable_screen_log 1
disable_render_time_tick 1
vid.width 600
vid.height 400
colorLog 0
r.enable_vsync 0
