# Per-project config, loaded on top of EngineVars.ini's [app] section (this file's
# values win). Selected via `startup_project` in EngineVars.ini or `--project <path>`.

g_project_name TesterProject

# data dir (g_project_base) and application class are the two vars every project needs
g_project_base "TestFilesData"

g_application_class "EngineTesterAppImpl"
#g_application_class "BikeGameApplication"
#g_application_class "fpsApp"
#g_application_class "ObsGameApplication"

# the main entry point into the game
g_entry_level "bike/bike_test_map.tmap"
ed_default_sky_material "indoorHdriSky"

# project-specific tooling paths
godot_lightmap_engine_path "C:/Users/charl/Documents/lightmapexporter/"
